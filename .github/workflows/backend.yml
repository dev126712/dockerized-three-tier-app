name: Backend Scan, Build & Publish
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**' 
      - '.github/workflows/backend.yml'
permissions:
  contents: read
  security-events: write  
jobs: 
  secirity-scan-Checkov-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
    - name: checkout repo
      uses: actions/checkout@v4
    - name: Run Checkov Security Scan on backend
      uses: bridgecrewio/checkov-action@master
      with:
        directory: backend/
        output_format: cli
        soft_fail: true
        quiet: true  

  build-image-backend:     
      needs: secirity-scan-Checkov-backend
      runs-on: ubuntu-latest
      permissions:
        contents: write 
      env:
        IMAGE_NAME_BACKEND: dockerized-three-tier-app-backend
        IMAGE_LATEST_TAG_BACKEND: ${{ secrets.GIT_USERNAME }}/dockerized-three-tier-app-backend:latest
        BACKEND_TAG: dockerized-three-tier-app-backend:latest, dockerized-three-tier-app-backend:${{ github.sha }}
      steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Set up QEMU 
        uses: docker/setup-qemu-action@v3 

      - name: set up docker
        uses: docker/setup-buildx-action@v2

      - name: Build the Docker images
        uses: docker/build-push-action@v6
        with:
            context: ./backend
            push: false
            tags: ${{ env.BACKEND_TAG }}
            load: true
            outputs: type=docker,dest=/tmp/${{ env.IMAGE_NAME_BACKEND }}.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
            name: ${{ env.IMAGE_NAME_BACKEND }}
            path: /tmp/${{ env.IMAGE_NAME_BACKEND }}.tar
  scan-backend-with-trivy:
    name: Trivy Security Scan Image Backend
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    needs: build-image-backend
    env:
      IMAGE_NAME_BACKEND: dockerized-three-tier-app-backend
    steps:
    - name: Download Image artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.IMAGE_NAME_BACKEND }}
        path: /tmp

    - name: Load image
      run: |
        docker load --input /tmp/${{ env.IMAGE_NAME_BACKEND }}.tar
        docker image ls -a

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y curl
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v0.57.0
  
    - name: Download Trivy vulnerability database
      run: trivy image --download-db-only
      
    - name: Run Trivy vulnerability scan
      run: |
        trivy image \
          --exit-code 0 \
          --format table \
          --ignore-unfixed \
          --pkg-types os,library \
          --severity CRITICAL,HIGH,MEDIUM \
          ${{ env.IMAGE_NAME_BACKEND }}:latest

  push-backend-image-to-dockerhub:
    name: Push Backend Image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    needs: scan-backend-with-trivy
    if: always() && needs.scan-backend-with-trivy.result != 'cancelled'
    env:
      IMAGE_NAME_BACKEND: dockerized-three-tier-app-backend
      
    steps:
    - name: Download Image artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.IMAGE_NAME_BACKEND }}
        path: /tmp

    - name: Load image
      run: |
        docker load --input /tmp/${{ env.IMAGE_NAME_BACKEND }}.tar
        docker image ls -a

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Tag Image with Docker Hub Username Prefix
      run: |
        DOCKER_REPO="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME_BACKEND }}"
        
        docker tag ${{ env.IMAGE_NAME_BACKEND }}:latest $DOCKER_REPO:latest
        
        docker tag ${{ env.IMAGE_NAME_BACKEND }}:latest $DOCKER_REPO:${{ github.sha }}

    - name: Push Image to Docker Hub
      run: |
        DOCKER_REPO="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME_BACKEND }}"
        
        docker push $DOCKER_REPO:latest
        docker push $DOCKER_REPO:${{ github.sha }}

    - name: Docker - Logout
      run: docker logout
    

    - name: Update Manifest Repository
      env:
        MANIFEST_REPO: "dev126712/three-tier-architecture-deployment"
        PAT_TOKEN: ${{ secrets.MANIFEST_REPO_PAT }}
      run: |
        # 1. Clone the manifest repo
        git clone https://x-access-token:${{ env.PAT_TOKEN }}@github.com/${{ env.MANIFEST_REPO }}.git manifest-repo
        ls -la
        cd manifest-repo
        
        # 2. Update the tag in the correct directory (3t-chart/values-dev.yaml)
        # Using yq to target the backend object within the dev values file
        yq -i '.backend.image.tag = "${{ github.sha }}"' ./3t-chart/values-dev.yaml
        
        # 3. Commit and Push
        git config user.email ${{ secrets.GIT_EMAIL }}
        git config user.name ${{ secrets.GIT_USERNAME }}
        git add .
        git commit -m "chore(dev): update backend image to ${{ github.sha }} [skip ci]"
        git push origin main
